---
- name: Get latest nvm version
  ansible.builtin.uri:
    url: https://api.github.com/repos/nvm-sh/nvm/releases/latest
    return_content: true
  register: linux_nvm_release
- name: Download nvm install script
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/nvm-sh/nvm/{{ linux_nvm_release.json.tag_name }}/install.sh"
    dest: /tmp/nvm-install.sh
    mode: "0755"
- name: Install nvm
  ansible.builtin.command:
    cmd: bash /tmp/nvm-install.sh
    creates: ~/.nvm/nvm.sh
- name: Install Node LTS
  ansible.builtin.shell:
    cmd: . ~/.nvm/nvm.sh && nvm install --lts
    executable: /bin/bash
  register: linux_output
  changed_when: "'already installed' not in linux_output.stderr"
- name: Set Node LTS as default
  ansible.builtin.shell:
    cmd: . ~/.nvm/nvm.sh && nvm alias default lts/*
    executable: /bin/bash
  register: linux_output
  changed_when: linux_output.rc != 0
