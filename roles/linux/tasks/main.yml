---
- name: Run requirements
  ansible.builtin.import_tasks: requirements.yml
  tags: always
- name: Add RPM keys
  become: true
  ansible.builtin.rpm_key:
    key: "{{ item }}"
  loop: "{{ rpm_keys }}"
  tags:
    - repos
    - rpm-keys
- name: Install dnf repos
  become: true
  ansible.builtin.dnf:
    name: "{{ item }}"
  loop: "{{ dnf.repos }}"
  tags:
    - repos
    - dnf-repos
- name: Install Microsoft repo
  become: true
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/config/rhel/7/prod.repo
    dest: /etc/yum.repos.d/microsoft.repo
    force: true
  tags:
    - repos
    - microsoft-repo
- name: Upower config
  become: true
  ansible.builtin.copy:
    content: |
      [UPower]
      EnableWattsUpPro=false
      NoPollBatteries=false
      IgnoreLid=false
      UsePercentageForPolicy=true
      PercentageLow=20.0
      PercentageCritical=10.0
      PercentageAction=5.0
      TimeLow=1200
      TimeCritical=300
      TimeAction=120
      AllowRiskyCriticalPowerAction=false
      CriticalPowerAction=HybridSleep
    dest: /etc/UPower/UPower.conf
  tags:
    - system
    - upower
- name: Install VSCodium repo
  become: true
  ansible.builtin.copy:
    content: |
      [gitlab.com_paulcarroty_vscodium_repo]
      name=gitlab.com_paulcarroty_vscodium_repo
      baseurl=https://paulcarroty.gitlab.io/vscodium-deb-rpm-repo/rpms/
      enabled=1
      gpgcheck=1
      repo_gpgcheck=1
      gpgkey=https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg
    dest: /etc/yum.repos.d/vscodium.repo
  tags:
    - repos
    - vscodium-repo
- name: Setup logind configuration
  become: true
  ignore_errors: true
  ansible.builtin.replace:
    path: /etc/systemd/logind.conf
    regexp: "^#{{ item }}(=.*)$"
    replace: "{{ item }}\\1"
  loop:
    - HandlePowerKey
    - HandleSuspendKey
    - HandleHibernateKey
    - HandleLidSwitch
    - HandleLidSwitchExternalPower
    - HandleLidSwitchDocked
  tags:
    - system
    - logind
- name: Setup DNS configuration
  ansible.builtin.import_tasks: dns.yml
  become: true
  ignore_errors: true
  tags:
    - system
    - dns
- name: Setup Docker
  ansible.builtin.import_tasks: docker.yml
  become: true
  tags: docker
- name: Setup Vagrant
  ansible.builtin.import_tasks: vagrant.yml
  become: true
  tags: vagrant
- name: Setup security updates
  ansible.builtin.import_tasks: security-updates.yml
  become: true
  ignore_errors: true
  tags:
    - system
    - security-updates
- name: Install core packages
  become: true
  ignore_errors: true
  ansible.builtin.package:
    name: "{{ packages.core }}"
    state: present
  tags:
    - packages
    - dnf
    - packages-core
- name: Install dev packages
  become: true
  ignore_errors: true
  ansible.builtin.package:
    name: "{{ packages.dev }}"
    state: present
  tags:
    - packages
    - dnf
    - packages-dev
- name: Install ui packages
  become: true
  ignore_errors: true
  ansible.builtin.package:
    name: "{{ packages.ui }}"
    state: present
  tags:
    - packages
    - dnf
    - packages-ui
- name: Install apps packages
  become: true
  ignore_errors: true
  ansible.builtin.package:
    name: "{{ packages.apps }}"
    state: present
  tags:
    - packages
    - dnf
    - packages-apps
- name: Install misc packages
  become: true
  ignore_errors: true
  ansible.builtin.package:
    name: "{{ packages.misc }}"
    state: present
  tags:
    - packages
    - dnf
    - packages-misc
- name: Install Pip packages
  ansible.builtin.pip:
    name: "{{ pip }}"
    extra_args: --user
  tags:
    - packages
    - pip
- name: Homebrew clone repo
  ansible.builtin.git:
    repo: https://github.com/Homebrew/brew
    dest: ~/.homebrew
  tags:
    - packages
    - homebrew
- name: Install Homebrew packages
  community.general.homebrew:
    name: "{{ homebrew }}"
    update_homebrew: true
    upgrade_all: true
  tags:
    - packages
    - homebrew
- name: enable Homebrew services
  community.general.homebrew_services:
    name: "{{ item }}"
  loop: "{{ homebrew_services }}"
  tags:
    - packages
    - homebrew
- name: Install Cargo packages
  community.general.cargo:
    name: "{{ cargo }}"
  tags:
    - packages
    - cargo
- name: Setup Flatpak
  ansible.builtin.import_tasks: flatpak.yml
  ignore_errors: true
  tags:
    - packages
    - flatpak
- name: Setup symlinks
  ansible.builtin.import_tasks: symlinks.yml
  tags:
    - dotfiles
    - symlinks
- name: Create vim undodir
  ansible.builtin.file:
    path: ~/.vim/undodir
    state: directory
  tags:
    - dotfiles
    - vim
- name: Install fonts
  ansible.builtin.shell: if hash fc-cache 2>/dev/null; then fc-cache -f; fi
  register: output
  changed_when: output.rc != 0
  tags:
    - fonts
    - font-cache
- name: Setup nftables
  ansible.builtin.import_tasks: nftables.yml
  become: true
  tags:
    - system
    - nftables
- name: Setup Nerdfonts
  ansible.builtin.import_tasks: nerd-fonts.yml
  tags:
    - fonts
    - nerdfonts
- name: Install VSCode extensions
  ansible.builtin.shell:
    cmd: "codium --install-extension {{ item }} ||:"
  loop: "{{ vscodium_extensions }}"
  register: output
  changed_when: output.rc != 0
  tags: vscodium
- name: Install snaps
  community.general.snap:
    name: "{{ snaps }}"
  ignore_errors: true
  tags:
    - packages
    - snaps
- name: Setup powertop unit
  become: true
  ansible.builtin.template:
    src: unit.service.j2
    dest: /etc/systemd/system/powertop.service
  vars:
    description: powertop autotune
    type: oneshot
    exec_start: /usr/sbin/powertop --auto-tune
    wanted_by: multi-user.target
  tags:
    - services
    - powertop
- name: Enable systemd user services
  ansible.builtin.systemd:
    name: "{{ item }}"
    scope: user
    state: restarted
    enabled: true
    daemon_reload: true
  loop: "{{ units.user.enabled }}"
  ignore_errors: true
  tags:
    - services
    - systemd-user
- name: Enable systemd system services
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
    enabled: true
    daemon_reload: true
  loop: "{{ units.system.enabled }}"
  ignore_errors: true
  register: output
  changed_when: output.enabled != true
  tags:
    - services
    - systemd-system
- name: Disable systemd system services
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    daemon_reload: true
  when: item ~ ".service" in ansible_facts.services
  loop: "{{ units.system.disabled }}"
  ignore_errors: true
  tags:
    - services
    - systemd-system
- name: Put user in groups
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups:
      - docker
      - wireshark
    append: true
  ignore_errors: true
  tags:
    - services
    - groups
